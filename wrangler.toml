name = "arsip-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install"

# Hapus komentar di bawah jika ingin custom domain (opsional)
# [[routes]]
# pattern = "api.portalagatha.com/*"
# zone_name = "portalagatha.com"

# Environment variables NON-SENSITIF (sisanya pakai wrangler secret)
[vars]
FRONTEND_URL = "https://portalagatha.com"
APP_ORIGIN = "https://portalagatha.com"
CORS_ORIGINS = "https://portalagatha.com,https://www.portalagatha.com,https://arsip-surat-app.vercel.app,http://localhost:3000,http://localhost:5173"

# Secrets (diset via: wrangler secret put NAMA_SECRET):
# JWT_SECRET
# ADMIN_PASSWORD
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# GOOGLE_PRIVATE_KEY
# GOOGLE_CLIENT_EMAIL
# GOOGLE_DRIVE_ROOT_FOLDER_ID
